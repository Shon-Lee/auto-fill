<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ho so dat dai</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">Ho so dat dai</p>
          <h1>Nhap lieu theo template</h1>
        </div>

        <label class="field">
          <span>Chon template</span>
          <select id="templateSelect"></select>
        </label>

        <div class="actions">
          <button id="newDraftBtn" class="button button-secondary">Tao ho so moi</button>
          <button id="renderBtn" class="button">Xuat file + PDF</button>
        </div>

        <section class="meta-card">
          <h2>Huong dan</h2>
          <ul>
            <li>Paste truc tiep tu Excel vao bang.</li>
            <li>Moi template co du lieu rieng, khong dung chung.</li>
            <li>Du lieu tu dong luu vao trinh duyet sau moi lan sua.</li>
          </ul>
        </section>

        <section class="meta-card">
          <h2>Trang thai</h2>
          <p id="saveStatus">Chua co thay doi.</p>
        </section>
      </aside>

      <main class="workspace">
        <section class="panel editor-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Nhap lieu</p>
              <h2 id="templateTitle"></h2>
            </div>
            <p id="templateDescription" class="muted"></p>
          </div>

          <div id="simpleSheetMount" class="sheet-stack"></div>
          <div id="repeatSheetMount" class="sheet-stack"></div>
        </section>

        <section class="panel preview-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Preview</p>
              <h2>Preview file</h2>
            </div>
          </div>

          <div id="previewMount" class="preview-content"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
